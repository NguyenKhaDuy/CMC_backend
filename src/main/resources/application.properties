spring.application.name=CMC_Backend

server.port=3000

spring.datasource.url = jdbc:mysql://localhost:3306/CMC
spring.datasource.username = root
spring.datasource.password = 1234

spring.jpa.hibernate.ddl-auto = none
#spring.jpa.hibernate.ddl-auto = create
#spring.jpa.hibernate.ddl-auto = update
#spring.jpa.hibernate.ddl-auto = create-drop

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans = true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.profiles.active=uat

# Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=cmcnoreply2026@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
server.servlet.session.timeout=30m

#ai
cmc.ai.provider=gemini
cmc.ai.model=gemini-2.5-flash-lite
cmc.ai.provider-order=gemini,chatgpt
cmc.ai.http.enabled=false
cmc.ai.spring.enabled=true
cmc.ai.model.chat=none

cmc.ai.api-key=
cmc.ai.gemini-api-key=
cmc.ai.chatgpt-api-key=

cmc.ai.gemini-model=gemini-2.5-flash-lite
cmc.ai.chatgpt-model=gpt-4o-mini

cmc.ai.gemini-endpoint=https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent
cmc.ai.chatgpt-endpoint=https://api.openai.com/v1/chat/completions
cmc.ai.gemini-search-grounding-enabled=true
cmc.ai.billing-guard-enabled=true
cmc.ai.app-daily-request-limit=200
cmc.ai.app-daily-token-limit=120000
cmc.ai.gemini-free-rpm=15
cmc.ai.gemini-free-tpm=250000
cmc.ai.gemini-free-rpd=1000
cmc.ai.gemini-search-free-rpd=500
cmc.ai.temperature=0.2
cmc.ai.max-tokens=700
cmc.ai.timeout-seconds=45
cmc.ai.allow-paid-models=false

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
